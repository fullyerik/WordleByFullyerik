name: Keep Supabase Alive

# Runs automatically on a schedule, plus a manual trigger button
on:
  schedule:
    # Every 3 days at 06:00 UTC (well within the 7-day pause window)
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        run: |
          curl -sf \
            "${{ secrets.SUPABASE_URL }}/rest/v1/words?select=word&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            && echo "Ping successful" \
            || (echo "Ping failed" && exit 1)
